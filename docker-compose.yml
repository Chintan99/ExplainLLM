services:
  modelservice:
    build:
      context: .
      dockerfile: Dockerfile.modelservice
    ports:
      - "8001:8001"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-meta-llama/Llama-3.2-1B-Instruct}
      - PYTHONPATH=/app/src
    volumes:
      - model-cache:/root/.cache/huggingface
      - ./src:/app/src
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      - modelservice
    environment:
      - MODEL_ID=${MODEL_ID:-meta-llama/Llama-3.2-1B-Instruct}
      - MODEL_SERVICE_URL=${MODEL_SERVICE_URL:-http://modelservice:8001}
      - PYTHONPATH=/app/src
    volumes:
      - model-cache:/root/.cache/huggingface
      - ./src:/app/src
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-meta-llama/Llama-3.2-1B-Instruct}
      - PROMPT=${PROMPT:-What is the capital of France?}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      - PYTHONPATH=/app/src
    volumes:
      - model-cache:/root/.cache/huggingface
      - ./src:/app/src
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  cli:
    build:
      context: .
      dockerfile: Dockerfile.ui
    profiles: ["cli"]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-meta-llama/Llama-3.2-1B-Instruct}
      - PROMPT=${PROMPT:-What is AI?}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      - PYTHONPATH=/app/src
    volumes:
      - model-cache:/root/.cache/huggingface
      - ./src:/app/src
    entrypoint: ["explainllm"]
    command:
      [
        "run",
        "--prompt",
        "${PROMPT:-What is AI?}",
        "--model",
        "${MODEL_ID:-meta-llama/Llama-3.2-1B-Instruct}",
        "--visualize",
      ]

volumes:
  model-cache:
